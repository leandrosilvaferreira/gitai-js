name: Commit → In Progress
on:
  push:
    branches-ignore:
      - main
      - master

jobs:
  set-in-progress:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, '[skip-pm]')"
    steps:
      - name: Check PROJECTS_PAT
        run: |
          if [ -z "${{ secrets.PROJECTS_PAT }}" ]; then
            echo "PROJECTS_PAT not set — skipping"
            exit 0
          fi

      - name: Extract issue numbers from commits
        id: issues
        env:
          COMMIT_MSG: ${{ github.event.commits[0].message }}
        run: |
          ISSUES=$(printf '%s' "$COMMIT_MSG" | grep -oE '#[0-9]+' | tr -d '#' | tr '\n' ',' | sed 's/,$//')
          echo "issue_numbers=$ISSUES" >> "$GITHUB_OUTPUT"

      - name: Move linked issues to In Progress
        if: steps.issues.outputs.issue_numbers != '' && secrets.PROJECTS_PAT != ''
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_PAT }}
          REPO: ${{ github.repository }}
          REPO_OWNER: ${{ github.repository_owner }}
          ISSUE_NUMBERS: ${{ steps.issues.outputs.issue_numbers }}
        run: |
          IFS=',' read -ra NUMS <<< "$ISSUE_NUMBERS"
          for N in "${NUMS[@]}"; do
            # Check if issue has pm:paused label — skip if so
            LABELS=$(gh issue view "$N" --repo "$REPO" --json labels --jq '[.labels[].name]')
            if echo "$LABELS" | grep -q '"pm:paused"'; then
              echo "Issue #$N has pm:paused — skipping"
              continue
            fi
            echo "Moving issue #$N to In Progress"
            # Note: update via GraphQL using pm-config IDs is done by the skill;
            # this workflow uses the project CLI shorthand
            gh project item-edit --id "$(gh project item-list 1 --owner "$REPO_OWNER" \
              --format json | python3 -c "
import sys,json; items=json.load(sys.stdin)['items']
for i in items:
  if i.get('content',{}).get('number') == $N: print(i['id']); break
")" --field-id Status --project-id 1 --single-select-option-id "In Progress" \
              --owner "$REPO_OWNER" 2>/dev/null || echo "Could not update #$N"
          done
