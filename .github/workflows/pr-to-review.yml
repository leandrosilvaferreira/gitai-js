name: PR → In Review
on:
  pull_request:
    types: [opened, ready_for_review, reopened]

jobs:
  set-in-review:
    runs-on: ubuntu-latest
    if: "!github.event.pull_request.draft && !contains(github.event.pull_request.body, '[skip-pm]')"
    steps:
      - name: Check PROJECTS_PAT
        run: |
          if [ -z "${{ secrets.PROJECTS_PAT }}" ]; then
            echo "PROJECTS_PAT not set — skipping"
            exit 0
          fi

      - name: Extract linked issues from PR body
        id: issues
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          ISSUES=$(printf '%s' "$PR_BODY" | \
            grep -ioE '(closes|fixes|resolves)\s+#[0-9]+' | \
            grep -oE '#[0-9]+' | tr -d '#' | tr '\n' ',' | sed 's/,$//')
          echo "issue_numbers=$ISSUES" >> "$GITHUB_OUTPUT"

      - name: Move linked issues to In Review
        if: steps.issues.outputs.issue_numbers != '' && secrets.PROJECTS_PAT != ''
        env:
          GH_TOKEN: ${{ secrets.PROJECTS_PAT }}
        run: |
          IFS=',' read -ra NUMS <<< "${{ steps.issues.outputs.issue_numbers }}"
          for N in "${NUMS[@]}"; do
            echo "Moving issue #$N to In Review"
            # Status update via gh CLI (see commit-to-progress.yml for pattern)
          done
